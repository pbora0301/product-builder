<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동물상 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>동물상 테스트</h1>
            <button id="theme-toggle" type="button" aria-label="색상 테마 전환">다크 모드</button>
        </div>
        <p class="intro-text">얼굴 사진을 업로드하면 AI가 강아지상인지 고양이상인지 분석합니다.</p>
        <section class="test-section" aria-labelledby="test-title">
            <div class="test-copy">
                <h2 id="test-title">AI 동물상 분석</h2>
                <p>정면 얼굴이 잘 보이는 사진을 올려 주세요. 업로드가 끝나면 모델이 가장 높은 확률의 동물상을 보여줍니다.</p>
                <label for="image-upload" class="primary-btn upload-label">사진 업로드하기</label>
                <input id="image-upload" type="file" accept="image/*">
                <p id="status-message" class="status-message">사진을 선택하면 분석을 시작합니다.</p>
            </div>
            <div class="preview-panel">
                <div id="image-preview-container" class="image-preview-container">
                    <img id="preview-image" alt="업로드한 얼굴 사진 미리보기" hidden>
                    <p id="preview-placeholder" class="preview-placeholder">아직 업로드된 사진이 없습니다.</p>
                </div>
                <div id="result-card" class="result-card">
                    <h3 id="result-title">분석 전</h3>
                    <p id="result-description">사진을 업로드하면 결과가 여기에 표시됩니다.</p>
                </div>
            </div>
        </section>
        <section class="probability-section" aria-labelledby="probability-title">
            <h2 id="probability-title">예측 확률</h2>
            <div id="label-container" class="label-container"></div>
        </section>
        <section class="contact-section" aria-labelledby="contact-title">
            <h2 id="contact-title">제휴 문의</h2>
            <p>협업이나 제휴 제안이 있다면 아래 폼으로 내용을 보내주세요.</p>
            <form class="contact-form" action="https://formspree.io/f/xykllbzn" method="POST">
                <label for="partner-name">이름</label>
                <input id="partner-name" name="name" type="text" placeholder="담당자 이름" required>

                <label for="partner-email">이메일</label>
                <input id="partner-email" name="email" type="email" placeholder="contact@example.com" required>

                <label for="partner-message">문의 내용</label>
                <textarea id="partner-message" name="message" rows="5" placeholder="제휴 내용과 연락처를 남겨주세요." required></textarea>

                <input type="hidden" name="_subject" value="새 제휴 문의가 도착했습니다">
                <button type="submit" class="submit-btn">문의 보내기</button>
            </form>
        </section>
        <section class="comments-section" aria-labelledby="comments-title">
            <h2 id="comments-title">댓글</h2>
            <p>테스트 결과나 재미있는 후기를 자유롭게 남겨주세요.</p>
            <div id="disqus_thread"></div>
        </section>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="main.js"></script>
    <script>
        (function() {
            var d = document;
            var s = d.createElement("script");
            s.src = "https://englishgame.disqus.com/embed.js";
            s.setAttribute("data-timestamp", +new Date());
            (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the comments powered by Disqus.</noscript>
</body>
</html>
