<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이엘츠 영단어 추천기</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>아이엘츠 영단어 추천기</h1>
            <button id="theme-toggle" type="button" aria-label="색상 테마 전환">다크 모드</button>
        </div>
        <p>버튼을 누르면 아이엘츠 시험 준비에 도움이 되는 영단어 5개를 추천합니다.</p>
        <button id="get-words-btn">단어 추천받기</button>
        <div id="word-list"></div>
    </div>
    <script src="main.js"></script>
</body>
</html>
